[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:vnc]
command=/bin/bash -c "su - vncuser -c 'vncserver :1 -geometry %(ENV_RESOLUTION)s -depth %(ENV_COLOR_DEPTH)s -fg'"
autostart=true
autorestart=true
stderr_logfile=/var/log/vnc.err.log
stdout_logfile=/var/log/vnc.out.log
environment=RESOLUTION="%(ENV_RESOLUTION)s",COLOR_DEPTH="%(ENV_COLOR_DEPTH)s"
priority=100
startsecs=10
startretries=3

[program:novnc]
command=/usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen %(ENV_PORT)s
autostart=true
autorestart=true
stderr_logfile=/var/log/novnc.err.log
stdout_logfile=/var/log/novnc.out.log
environment=PORT="%(ENV_PORT)s"
priority=200
startsecs=5
startretries=3
depends_on=vnc

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx.err.log
stdout_logfile=/var/log/nginx.out.log
priority=300
startsecs=5
startretries=3