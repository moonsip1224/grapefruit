version: '3.8'

services:
  roblox-studio-web:
    build: .
    ports:
      - "6080:6080"
    environment:
      - PORT=6080
      - NOVNC_PORT=6080
      - DISPLAY=:1
      - VNC_PASSWORD=robloxstudio2024
      - RESOLUTION=1920x1080
      - COLOR_DEPTH=24
      - NODE_ENV=development
    # Note: Railway manages persistent storage automatically
    # No volume declarations needed for Railway deployment
    restart: unless-stopped
    healthcheck:
      test: ["/health-check.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Railway manages volumes automatically - no volume definitions needed