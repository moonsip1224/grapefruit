[build]
builder = "dockerfile"

[deploy]
startCommand = "/scripts/railway-optimized-start.sh"
restartPolicyType = "always"
healthcheckPath = "/health"
healthcheckTimeout = 300

[[services]]
name = "roblox-studio-web"

[services.variables]
PORT = "6080"
DISPLAY = ":1"
VNC_PASSWORD = "robloxstudio2024"
RESOLUTION = "1920x1080"
COLOR_DEPTH = "24"
NODE_ENV = "production"
NOVNC_PORT = "6080"